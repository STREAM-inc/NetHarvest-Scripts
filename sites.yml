# =============================================================================
# NetHarvest サイト設定ファイル
#
# 全クローラーの設定を一元管理する。
# deploy.py がこのファイルを読み込み、Prefect Deployment を自動登録する。
#
# フィールド:
#   site_id  : システム用の英語ID (DB主キー、ユニーク必須)
#   name     : 日本語表示名 (CSV ファイル名、ログ、カタログ表示)
#   module   : クローラーのモジュールパス (scripts/sites/ からの相対パス、ドット区切り)
#   url      : 対象 URL
#   schedule : cron 式 (null = 手動実行のみ)
#   enabled  : false にすると deploy.py がスキップ (Deployment 未登録 = 実行されない)
# =============================================================================

sites:
